<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sri Atmananda Pranayama Yoga Kendra | Gallery</title>
    <meta
      name="description"
      content="Moments from practice and learning at Sri Atmananda Pranayama Yoga Kendra."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css" />
    <script src="config.js" defer></script>
    <script src="header.js" defer></script>
    <script src="footer.js" defer></script>
    <script src="js/main.js" defer></script>
  </head>
  <body data-page="gallery">
    <a class="skip-link" href="#main-content">Skip to main content</a>
    <div data-site-header></div>

    <main id="main-content">
      <section class="section-block">
        <div class="container page-hero">
          <article class="page-hero__panel story-card" data-reveal>
            <p class="section-kicker">Gallery</p>
            <h1 class="section-title">Moments from practice and learning.</h1>
            <p class="page-hero__copy">
              A glimpse into real sessions, learning environment, and the calm atmosphere of the institute.
            </p>
          </article>
          <article class="media-frame glass-card" data-reveal>
            <img data-config-image="images.gallery.0" src="" alt="Practice session at the institute" width="900" height="700" />
          </article>
        </div>
      </section>

      <section class="section-block">
        <div class="container gallery-grid">
          <figure class="gallery-card gallery-card--wide" data-reveal>
            <img data-config-image="images.gallery.1" src="" alt="Practice moment one" width="1200" height="820" />
            <figcaption>Calm and focused learning.</figcaption>
          </figure>
          <figure class="gallery-card gallery-card--tall" data-reveal>
            <img data-config-image="images.gallery.2" src="" alt="Practice moment two" width="900" height="1020" />
            <figcaption>Step-by-step guidance in practice.</figcaption>
          </figure>
          <figure class="gallery-card gallery-card--tall" data-reveal>
            <img data-config-image="images.gallery.3" src="" alt="Practice moment three" width="900" height="1020" />
            <figcaption>A calm atmosphere for learning.</figcaption>
          </figure>
          <figure class="gallery-card gallery-card--wide" data-reveal>
            <img data-config-image="images.gallery.4" src="" alt="Practice moment four" width="1200" height="820" />
            <figcaption>Steady breath practice with attention.</figcaption>
          </figure>
          <figure class="gallery-card gallery-card--wide" data-reveal>
            <img data-config-image="images.gallery.5" src="" alt="Practice moment five" width="1200" height="820" />
            <figcaption>Learning with simplicity and sincerity.</figcaption>
          </figure>
          <figure class="gallery-card gallery-card--tall" data-reveal>
            <img data-config-image="images.gallery.6" src="" alt="Practice moment six" width="900" height="1020" />
            <figcaption>Real glimpses from student engagement.</figcaption>
          </figure>
        </div>
      </section>

      <section class="section-block">
        <div class="container" data-reveal>
          <h2 class="section-title">Videos</h2>
          <div class="video-wrapper">
            <iframe
              width="100%"
              height="400"
              src="https://www.youtube.com/embed/Iy2rdf8vCmg?feature=oembed"
              title="Omkara Pranayama video"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen>
            </iframe>
          </div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>
  </body>
</html>
